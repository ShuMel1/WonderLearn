name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android build, test & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :composeApp:assembleDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew :composeApp:testDebugUnitTest --stacktrace

      - name: Lint
        run: ./gradlew :composeApp:lintDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: trackit-debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload test & lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            composeApp/build/reports/
          if-no-files-found: ignore
